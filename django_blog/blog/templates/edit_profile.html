<h2>Edit Profile</h2>
<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}
    
    {% if form.errors %}
        <div class="error">
            {% for field in form %}
                {% for error in field.errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            {% endfor %}
        </div>
    {% endif %}
    
    <button type="submit">Save Changes</button>
</form>
